name: quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  forex:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    defaults:
      run:
        working-directory: apps/forex-scanner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run fast cloud-safe tests only
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          tests = [
              "tests/test_safety.py",
              "tests/test_demo_bot.py",
              "tests/test_multi_asset_safety.py",
              "tests/test_market_sessions.py",
              "tests/test_session_aware_scanning.py",
              "tests/test_session_wait_mode.py",
              "tests/test_forward_test_paper.py",
              "tests/test_demo_execution_gate.py",
          ]
          existing = [t for t in tests if Path(t).exists()]
          print("Running tests:", existing)
          assert existing, "No cloud-safe tests found"

          cmd = [sys.executable, "-m", "pytest", "-q", *existing, "--maxfail=1"]
          raise SystemExit(subprocess.call(cmd))
          PY

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/aurora-player
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format:check

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: E2E
        run: npm run e2e
