name: quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  forex:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    defaults:
      run:
        working-directory: apps/forex-scanner
    env:
      EXECUTION_MODE: paper
      BROKER_MODE: paper
      ALLOW_LIVE_TRADING: "false"
      MT5_DEMO_ONLY: "true"
      AUTO_BOT_ENABLED: "false"
      ALLOW_MULTI_ASSET_DEMO_TRADING: "false"
      ENABLE_DEMO_EXECUTION: "false"
      NOTIFICATIONS_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/forex-scanner/requirements.txt

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run fast cloud-safe tests only
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          tests = [
              "tests/test_autonomous_supervisor.py",
              "tests/test_safety.py",
              "tests/test_demo_bot.py",
              "tests/test_multi_asset_safety.py",
              "tests/test_market_sessions.py",
              "tests/test_session_aware_scanning.py",
              "tests/test_session_wait_mode.py",
              "tests/test_forward_test_paper.py",
              "tests/test_demo_execution_gate.py",
              "tests/test_operator_dashboard.py",
              "tests/test_session_bundle.py",
              "tests/test_paper_performance.py",
              "tests/test_paper_session_review.py",
              "tests/test_paper_session_history.py",
          ]
          existing = [t for t in tests if Path(t).exists()]
          print("Running tests:", existing)
          if not existing:
              print("No cloud-safe tests found; skipping.")
              raise SystemExit(0)

          cmd = [sys.executable, "-m", "pytest", "-q", *existing, "--maxfail=1"]
          raise SystemExit(subprocess.call(cmd))
          PY

  web:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    defaults:
      run:
        working-directory: apps/aurora-player
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Quick web workspace sanity
        run: |
          test -f package.json
          node --version || true
          npm --version || true
          echo "Web heavy checks are intentionally excluded from the fast repository quality workflow."
