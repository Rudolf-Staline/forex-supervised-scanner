name: tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  fast-cloud-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    defaults:
      run:
        working-directory: apps/forex-scanner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/forex-scanner/requirements.txt

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run fast cloud-safe suite
        run: |
          python -m pytest -q \
            tests/test_safety.py \
            tests/test_demo_bot.py \
            tests/test_multi_asset_safety.py \
            tests/test_market_sessions.py \
            tests/test_session_aware_scanning.py \
            tests/test_session_wait_mode.py \
            tests/test_forward_test_paper.py \
            tests/test_demo_execution_gate.py \
            --maxfail=1
